# Arcology Docker Compose
#
# Runs the web application and analysis worker(s) together.
#
# Usage:
#   mkdir -p data/uploads data/outputs data/db  # Create directories first
#   docker-compose up -d                        # Start with 1 worker
#   docker-compose up -d --scale worker=4       # Start with 4 workers
#   docker-compose logs -f worker               # Watch worker logs
#   docker-compose down                         # Stop all services
#
# The web app runs on port 8000 by default.
#
# To run Adminer (database browser) for debugging, see docker-compose.adminer.yml.
#
# For production, create a .env file:
#   echo "FLASK_ENV=production" >> .env
#   echo "SECRET_KEY=$(python3 -c 'import secrets; print(secrets.token_hex(32))')" >> .env
#   python3 -c 'import secrets; print(f"WORKER_API_KEY=wrk_{secrets.token_hex(32)}")' >> .env
#
# WORKER_API_KEY must be the same value in both the web and worker containers.
#
# Note: Building the worker image takes a long time due to compiling
# HxCFE, Fluxfox (Rust), and optionally DiscImageManager (Lazarus).

services:
  # Main web application
  web:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
        restart: true
    ports:
      - "8000:8000"
    volumes:
      - ./data/uploads:/app/instance/uploads
      - ./data/outputs:/app/instance/outputs
      - ./data/db:/var/lib/myapp
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # Analysis worker(s)
  # Scale with: docker-compose up -d --scale worker=N
  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    depends_on:
      web:
        condition: service_healthy
        restart: true
    volumes:
      - ./data/uploads:/data/uploads
      - ./data/outputs:/data/outputs
    environment:
      - ARCOLOGY_API=http://web:8000/api
      - UPLOAD_DIR=/data/uploads
      - OUTPUT_DIR=/data/outputs
      - POLL_INTERVAL=10
      - LOG_LEVEL=INFO
      - MAX_ARCHIVE_DEPTH=10  # Maximum recursion depth for nested archives
      - WORKER_API_KEY=${WORKER_API_KEY}
    restart: unless-stopped
    deploy:
      # Default to 1 replica, override with --scale worker=N
      replicas: 1
      resources:
        limits:
          # Adjust based on your system
          cpus: '2'
          memory: 4G

  # PostgreSQL database server
  db:
    image: pgautoupgrade/pgautoupgrade:latest
    restart: unless-stopped
    # set shared memory limit when using docker compose
    shm_size: 128mb
    environment:
      - POSTGRES_DB=arcology
      - POSTGRES_USER=arcology_user
      - POSTGRES_PASSWORD=arcology_password
    volumes:
      - ./data/db/pg:/var/lib/postgresql


