# Arcology Docker Compose
#
# Runs the web application and analysis worker(s) together.
#
# Usage:
#   mkdir -p data/uploads data/outputs data/db data/jinja_cache data/chunks  # Create directories first
#   docker-compose up -d                        # Start with 1 worker
#   docker-compose up -d --scale worker=4       # Start with 4 workers
#   docker-compose logs -f worker               # Watch worker logs
#   docker-compose down                         # Stop all services
#
# The web app runs on port 8000 by default.
#
# To run Adminer (database browser) for debugging, see docker-compose.adminer.yml.
#
# For production, create a .env file:
#   python3 -c 'import secrets; print(f"SECRET_KEY={secrets.token_urlsafe(32)}")' >> .env
#   python3 -c 'import secrets; print(f"WORKER_API_KEY=wrk_{secrets.token_urlsafe(32)}")' >> .env
#
# WORKER_API_KEY must be the same value in both the web and worker containers.
#
# Note: Building the worker image takes a long time due to compiling
# HxCFE, Fluxfox (Rust), and optionally DiscImageManager (Lazarus).

services:
  # Main web application
  web:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
        restart: true
    ports:
      - "8000:8000"
    volumes:
      - ./data/uploads:/app/instance/uploads
      - ./data/outputs:/app/instance/outputs
      # Stage in-progress chunked uploads on a persisted volume rather than the
      # container's ephemeral writable layer. Without this, large uploads land
      # on the container rootfs (potentially small, or even tmpfs/RAM) and a
      # container recreate discards resumable sessions. This is the default
      # CHUNK_DIR (instance/.chunks).
      - ./data/chunks:/app/instance/.chunks
      - ./data/db:/var/lib/myapp
      # Persist compiled Jinja template bytecode across container recreation so
      # workers never recompile templates after a redeploy (#447). This is the
      # default JINJA_BYTECODE_CACHE_DIR (instance/jinja_cache).
      - ./data/jinja_cache:/app/instance/jinja_cache
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    # On `docker compose stop/down`, give Gunicorn time to drain in-flight
    # requests (it stops accepting new ones immediately). Should comfortably
    # exceed GUNICORN_GRACEFUL_TIMEOUT (default 30s) in Dentrypoint.sh.
    stop_grace_period: 45s

  # Analysis worker(s)
  # Scale with: docker-compose up -d --scale worker=N
  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    depends_on:
      web:
        condition: service_healthy
        restart: true
    volumes:
      - ./data/uploads:/data/uploads
      - ./data/outputs:/data/outputs
    environment:
      - ARCOLOGY_API=http://web:8000/api
      - UPLOAD_DIR=/data/uploads
      - OUTPUT_DIR=/data/outputs
      - POLL_INTERVAL=10
      - LOG_LEVEL=INFO
      - MAX_ARCHIVE_DEPTH=10  # Maximum recursion depth for nested archives
      - WORKER_API_KEY=${WORKER_API_KEY}
      # REPLAY_PROCESS uses the Acorn Replay decompressor modules bundled in
      # the worker image (REPLAY_MODULES_DIR defaults to them). Override here to
      # point at a different/mounted module set. See doc/REPLAY_TRANSCODE.md.
      # Restrict this worker to specific job types (comma-separated AnalysisType names).
      # Leave unset (or empty) to accept all job types.
      # Example for a dedicated flux-decoding worker pool:
      #   - WORKER_ANALYSIS_TYPES=FLUX_VISUALISATION,FLUX_DECODE,METADATA_EXTRACT
    restart: unless-stopped
    # On SIGTERM the worker stops claiming new jobs and finishes the one in
    # flight before exiting. A single analysis can run up to TOOL_TIMEOUT
    # (default 3600s), so give it room to land instead of being SIGKILL'd
    # (exit 137). Raise toward TOOL_TIMEOUT if you routinely process large
    # flux dumps and want every shutdown to wait for the current job; lower it
    # if you prefer faster shutdowns (a killed job is just reset to PENDING and
    # re-run by the next worker, so this is safe to tune down).
    stop_grace_period: 120s
    deploy:
      # Default to 1 replica, override with --scale worker=N
      replicas: 1
      resources:
        limits:
          # Adjust based on your system
          cpus: '2'
          memory: 4G

  # Task runner: single-instance, DB-only maintenance loop.
  #
  # Reuses the WEB image (not the worker image) and runs `flask taskrunner`. It
  # owns the control-plane analyses — HASH_RESCAN, PRODUCT_RECOGNITION, and the
  # HASHDB_LINK / HASHDB_DELETE / HASHDB_RECOGNITION hash-database jobs — running
  # them in-process with direct database access (no HTTP round-trips), and runs
  # time-based periodic maintenance (stale-job reset, chunked-upload GC, and an
  # optional scheduled similarity rebuild).
  #
  # The analysis worker no longer claims these job types, so exactly one task
  # runner should be deployed: the atomic job claim is concurrency-safe, but the
  # periodic tasks assume a single instance. Do NOT scale this service.
  taskrunner:
    build:
      context: .
      dockerfile: Dockerfile          # reuse the web image
    command: ["taskrunner"]           # Dentrypoint.sh branch -> exec flask taskrunner
    depends_on:
      web:
        # The web service applies `flask db upgrade`; wait for it so the schema
        # is present before the runner touches the database.
        condition: service_healthy
        restart: true
      db:
        condition: service_healthy
        restart: true
    volumes:
      # DB-only jobs need no uploads/ or outputs/. Only chunk GC touches the
      # filesystem, so mount the same chunk volume the web service uses (and keep
      # CHUNK_DIR aligned — both default to instance/.chunks).
      - ./data/chunks:/app/instance/.chunks
    env_file:
      - .env
    environment:
      # Periodic maintenance intervals (seconds; 0 disables). Similarity rebuild
      # is heavy and off by default — opt in by raising TASKRUNNER_SIMILARITY_INTERVAL.
      - TASKRUNNER_STALE_RESET_INTERVAL=300
      - TASKRUNNER_CHUNK_GC_INTERVAL=3600
      - TASKRUNNER_SIMILARITY_INTERVAL=0
      - LOG_LEVEL=INFO
    restart: unless-stopped
    # On SIGTERM the runner finishes the current job before exiting.
    stop_grace_period: 60s
    deploy:
      replicas: 1                      # single instance — do NOT scale
      resources:
        limits:
          cpus: '1'
          memory: 2G

  # PostgreSQL database server
  db:
    image: pgautoupgrade/pgautoupgrade:latest
    restart: unless-stopped
    # set shared memory limit when using docker compose
    shm_size: 128mb
    environment:
      - POSTGRES_DB=arcology
      - POSTGRES_USER=arcology_user
      - POSTGRES_PASSWORD=arcology_password
    volumes:
      - ./data/db/pg:/var/lib/postgresql


