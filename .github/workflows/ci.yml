name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      migrations: ${{ steps.filter.outputs.migrations }}
      web: ${{ steps.filter.outputs.web }}
      worker: ${{ steps.filter.outputs.worker }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            migrations:
              - 'migrations/**'
              - 'myapp/database.py'
              - 'arcology_shared/enums.py'
              - 'requirements.txt'
            web:
              - 'Dockerfile'
              - 'Dentrypoint.sh'
              - '.flaskenv'
              - 'requirements.txt'
              - 'myapp/**'
              - 'arcology_shared/**'
            worker:
              - 'worker/**'
              - 'arcology_shared/**'

  lint:
    name: Static Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Check Python syntax
        run: python ci/check_syntax.py

      - name: Install ruff
        run: pip install ruff

      - name: Ruff lint (pyflakes ruleset)
        run: ruff check .

      - name: Unit tests (stdlib only, no dependencies)
        # test_slug.py is the only test that can run without pip install.
        # All other test_*.py files are discovered in the app-tests job.
        run: python -m unittest ci.test_slug -v

  migration-static:
    name: Migration Static Checks
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.migrations == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Check migration sanity
        run: python ci/check_migration_sanity.py

      - name: Fetch target branch for migration conflict check
        if: github.event_name == 'pull_request'
        run: git fetch origin ${{ github.event.pull_request.base.ref }} --depth=1

      - name: Check cross-branch migration conflicts
        if: github.event_name == 'pull_request'
        run: python ci/check_migration_conflict.py --target-ref origin/${{ github.event.pull_request.base.ref }}

  app-tests:
    name: Application Tests (SQLite)
    runs-on: ubuntu-latest
    needs: lint
    env:
      SQLALCHEMY_DATABASE_URI: "sqlite:///:memory:"
      SECRET_KEY: ci-test-secret-key-not-for-production
      WORKER_API_KEY: ci-test-worker-key

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        # zstandard is a CLI dependency (cli/pyproject.toml) needed by the
        # bulk-import sidecar-bundling tests; the main app does not require it.
        # pillow and scour are worker dependencies (image/SVG conversion) —
        # without them the 13 tests in ci/test_image_conversion.py silently
        # skip, so the result-dict contract they assert is never checked.
        run: pip install -r requirements.txt zstandard pillow scour

      - name: Check imports
        run: python ci/check_imports.py

      - name: Unit tests (app-level)
        # run_app_tests.py escalates SQLAlchemy warnings (e.g. cartesian-product
        # joins) to test failures so they cannot slip through unnoticed.  A bare
        # `python -W error::sqlalchemy.exc.SAWarning` does not work — the
        # category cannot be resolved at interpreter startup.  See
        # myapp/utils/warnings.py and ci/test_cartesian_join.py.
        # It fans the test modules out across the runner's CPUs (default
        # os.cpu_count(); override with TEST_JOBS) — set TEST_JOBS=1 to debug.
        run: python ci/run_app_tests.py

  tlsh-plumbing:
    name: TLSH Plumbing (py-tlsh)
    runs-on: ubuntu-latest
    needs: lint
    # Verifies the optional TLSH integration end-to-end with the real library.
    # py-tlsh is a C++ extension kept out of requirements.txt; this isolated job
    # installs it so the otherwise-skipped TLSH tests actually run.  A failure
    # here never affects the main app-tests job.
    env:
      SQLALCHEMY_DATABASE_URI: "sqlite:///:memory:"
      SECRET_KEY: ci-test-secret-key-not-for-production
      WORKER_API_KEY: ci-test-worker-key

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies (incl. optional py-tlsh)
        run: pip install -r requirements.txt py-tlsh

      - name: Verify py-tlsh loaded (guard against silent skips)
        run: python -c "import arcology_shared.fuzzyhash as f; assert f.HAS_TLSH, 'py-tlsh failed to import'; print('TLSH available')"

      - name: Similarity tests with the real TLSH library
        run: python -m unittest ci.test_similarity -v

  test-migrations:
    name: Migration Tests (PostgreSQL)
    runs-on: ubuntu-latest
    # Toggle via repository variable: Settings > Secrets and variables > Actions > Variables
    # Set ENABLE_MIGRATION_TESTS to "true" to enable this job.
    # Only runs when migration-related files have changed.
    #
    # Depends on migration-static: the fast static checks (sanity, conflict
    # detection) are a prerequisite for the slow PostgreSQL upgrade/downgrade
    # cycle.  If the static checks fail the Postgres run would fail too, so
    # gating on it avoids burning ~a minute of runner time on the sad path.
    if: vars.ENABLE_MIGRATION_TESTS == 'true' && needs.changes.outputs.migrations == 'true'
    needs: [changes, migration-static]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: arcology_test
          POSTGRES_USER: arcology_test
          POSTGRES_PASSWORD: arcology_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U arcology_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SQLALCHEMY_DATABASE_URI: postgresql://arcology_test:arcology_test@localhost:5432/arcology_test
      SECRET_KEY: ci-test-secret-key-not-for-production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Show Alembic heads
        run: flask db heads

      - name: Upgrade database (fresh)
        run: flask db upgrade

      - name: Downgrade database (full)
        run: flask db downgrade base

      - name: Re-upgrade database (idempotency)
        run: flask db upgrade

  docker-build-web:
    name: Docker Build (web)
    runs-on: ubuntu-latest
    # Toggle via repository variable: Settings > Secrets and variables > Actions > Variables
    # Set ENABLE_DOCKER_BUILD to "true" to enable this job.
    # Recommended to enable after open-sourcing (unlimited free minutes for public repos).
    #
    # Only builds:
    #   * after the branch has merged to master (push to master, not on PRs);
    #   * when every other non-skipped test job passed (!failure() treats
    #     skipped optional jobs — e.g. the migration jobs — as OK);
    #   * when files affecting the web image actually changed.
    needs: [changes, lint, app-tests, migration-static, test-migrations]
    if: >-
      ${{ !cancelled() && !failure()
          && vars.ENABLE_DOCKER_BUILD == 'true'
          && github.event_name == 'push'
          && github.ref == 'refs/heads/master'
          && needs.changes.outputs.web == 'true' }}

    steps:
      - uses: actions/checkout@v4

      - name: Build web image
        run: docker build -t arcology-web:test .

  docker-build-worker:
    name: Docker Build (worker)
    runs-on: ubuntu-latest
    # See docker-build-web above for the gating rationale.  Only builds when
    # files affecting the worker image (worker/** or shared code) changed.
    needs: [changes, lint, app-tests, migration-static, test-migrations]
    if: >-
      ${{ !cancelled() && !failure()
          && vars.ENABLE_DOCKER_BUILD == 'true'
          && github.event_name == 'push'
          && github.ref == 'refs/heads/master'
          && needs.changes.outputs.worker == 'true' }}

    steps:
      - uses: actions/checkout@v4

      - name: Build worker image
        run: docker build -t arcology-worker:test -f worker/Dockerfile .
