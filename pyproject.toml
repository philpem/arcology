# Ruff lint configuration.
#
# We start with the pyflakes ruleset (F) — equivalent to running pyflakes
# directly, but ~10–100× faster and trivially extensible. To enable additional
# checks (e.g. pycodestyle, pyupgrade, isort), add letters to `select` below.

[tool.ruff]
target-version = "py310"
line-length = 120
extend-exclude = [
    "venv",
    ".venv",
    "data",
    "worker/tools",  # vendored C sources, not Python
    "doc",           # format research / reference scripts, not shipped code
]

[tool.ruff.lint]
select = ["F"]
