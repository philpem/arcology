# Ruff lint configuration.
#
# Defaults (E4, E7, E9, F) cover pycodestyle-essential + pyflakes. We extend
# them with isort (I), pyupgrade (UP) and flake8-bugbear (B). To pull in more
# rule groups (e.g. SIM, C4, RUF), add to `extend-select` below.

[tool.ruff]
target-version = "py310"
line-length = 120
extend-exclude = [
    "venv",
    ".venv",
    "data",
    "worker/tools",  # vendored C sources, not Python
    "doc",           # format research / reference scripts, not shipped code
]

[tool.ruff.lint]
extend-select = [
    "I",   # isort — sorted, grouped imports
    "UP",  # pyupgrade — modernise syntax for target-version
    "B",   # flake8-bugbear — likely bugs (mutable defaults, broad except, etc.)
]
ignore = [
    # SQLAlchemy filter expressions need ==/!= rather than is/is not, since
    # `Column == None` compiles to `IS NULL` whereas `Column is None` is a
    # Python identity check (always False) and breaks the query.
    "E711",  # comparison to None
    "E712",  # comparison to True/False
    # `open(path, 'r')` is preferred over the bare `open(path)` form even though
    # the mode string is technically redundant — being explicit aids readability.
    "UP015",  # redundant-open-modes
]

[tool.ruff.lint.isort]
# Don't insert blank lines between import sections (stdlib / third-party /
# first-party). The blank lines look fine at the top of a file but produce a
# distracting "lots of blank lines" gap in function-local import blocks.
no-lines-before = ["future", "standard-library", "third-party", "first-party", "local-folder"]

[tool.ruff.lint.per-file-ignores]
# Tests prepend the repo root to sys.path before importing, which forces
# imports below the path setup.
"ci/test_*.py" = ["E402"]
# Worker entry-point sets sys.path so `shared/` is importable when the
# worker is run outside Docker.
"worker/worker.py" = ["E402"]
