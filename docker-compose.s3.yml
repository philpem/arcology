# Arcology Docker Compose - S3 Storage Override
#
# Enables S3-compatible object storage for distributed workers.
# Use with the base docker-compose.yml:
#
#   docker compose -f docker-compose.yml -f docker-compose.s3.yml up -d
#
# Before first start:
#   1. Create data directory:
#      mkdir -p data/garage
#
#   2. Start Garage first to generate its node ID:
#      docker compose -f docker-compose.yml -f docker-compose.s3.yml up garage -d
#
#   3. Configure Garage (one-time setup):
#      ADMIN_TOKEN=$(docker compose -f docker-compose.yml -f docker-compose.s3.yml exec garage cat /var/lib/garage/admin_token)
#      # Get node ID and configure layout:
#      curl -s -H "Authorization: Bearer $ADMIN_TOKEN" http://localhost:3903/v1/status
#      curl -H "Authorization: Bearer $ADMIN_TOKEN" -X POST http://localhost:3903/v1/layout/assign \
#        -d '[{"id":"<NODE_ID>","zone":"dc1","capacity":1000000000,"tags":["node1"]}]'
#      curl -H "Authorization: Bearer $ADMIN_TOKEN" -X POST http://localhost:3903/v1/layout/apply \
#        -d '{"version":1}'
#      # Create access key:
#      curl -s -H "Authorization: Bearer $ADMIN_TOKEN" -X POST http://localhost:3903/v1/key
#      # Note the accessKeyId and secretAccessKey from the response and add to .env:
#      #   S3_ACCESS_KEY=<accessKeyId>
#      #   S3_SECRET_KEY=<secretAccessKey>
#      # Create bucket:
#      curl -H "Authorization: Bearer $ADMIN_TOKEN" -X POST http://localhost:3903/v1/bucket \
#        -d '{"globalAliases":["arcology"]}'
#      # Allow the key to access the bucket:
#      curl -H "Authorization: Bearer $ADMIN_TOKEN" -X POST http://localhost:3903/v1/bucket/allow \
#        -d '{"bucketId":"<BUCKET_ID>","accessKeyId":"<ACCESS_KEY_ID>","permissions":{"read":true,"write":true,"owner":true}}'
#
#   See https://garagehq.deuxfleurs.fr/documentation/quick-start/ for full docs.
#
# This enables workers to run on separate machines — they access files
# via S3 instead of requiring shared Docker volume mounts.
#
# Recommended self-hosted S3 backends:
#   - Garage (https://garagehq.deuxfleurs.fr/) - lightweight, single binary
#   - SeaweedFS (https://github.com/seaweedfs/seaweedfs) - scalable
#
# For cloud deployments, any S3-compatible service works (AWS S3, etc.)

services:
  # S3-compatible object storage (Garage)
  # Replace with your preferred S3-compatible service if needed.
  garage:
    image: dxflrs/garage:v1.1.0
    volumes:
      - ./data/garage:/var/lib/garage
      - ./docker/garage.toml:/etc/garage.toml:ro
    ports:
      - "3900:3900"   # S3 API
      - "3903:3903"   # Admin API (for initial setup only)
    restart: unless-stopped

  web:
    environment:
      - STORAGE_BACKEND=s3
      - S3_ENDPOINT_URL=http://garage:3900
      - S3_BUCKET=${S3_BUCKET:-arcology}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_REGION=${S3_REGION:-garage}

  worker:
    environment:
      - STORAGE_BACKEND=s3
      - S3_ENDPOINT_URL=http://garage:3900
      - S3_BUCKET=${S3_BUCKET:-arcology}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_REGION=${S3_REGION:-garage}
    # Workers no longer need shared volume mounts for uploads/outputs
    # — they access files via S3 and use local temp space for processing.
    # Uncomment below to remove the shared volumes:
    # volumes: !override []
