{#
  analysis_status_poller(status_url, interval=8000, known_pending=none, known_running=none)

  Emits a self-contained <script> block that polls status_url every `interval` ms
  and reloads the page when analysis counts change.

  Behaviour depends on whether initial counts are supplied:
  - Without known_pending/known_running: reload when both reach 0 (all done).
  - With known_pending/known_running:    reload on any count change (progress update).

  In both cases a reloadScheduled flag prevents double-firing.

  Parameters:
    status_url      URL returning {"pending": N, "running": N}
    interval        Poll interval in ms (default 8000)
    known_pending   Initial pending count; enables change-detection mode
    known_running   Initial running count; enables change-detection mode
#}
{% macro analysis_status_poller(status_url, interval=8000, known_pending=none, known_running=none) %}
<script>
(function () {
    var POLL_INTERVAL = {{ interval }};
    var statusUrl = {{ status_url | tojson }};
    {% if known_pending is not none %}
    var knownPending = {{ known_pending }};
    var knownRunning = {{ known_running }};
    {% endif %}
    var reloadScheduled = false;

    function pollStatus() {
        fetch(statusUrl, {cache: 'no-store'}).then(function (r) {
            if (!r.ok) return;
            return r.json();
        }).then(function (d) {
            if (!d || reloadScheduled) return;
            {% if known_pending is not none %}
            if (d.pending !== knownPending || d.running !== knownRunning) {
                reloadScheduled = true;
                setTimeout(function () { window.location.reload(); }, 500);
            }
            {% else %}
            if (d.pending === 0 && d.running === 0) {
                reloadScheduled = true;
                setTimeout(function () { window.location.reload(); }, 500);
            }
            {% endif %}
        }).catch(function () {});
    }

    setInterval(pollStatus, POLL_INTERVAL);
})();
</script>
{% endmacro %}
